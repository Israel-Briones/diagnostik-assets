<svg width="200" height="220" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71"/>
      <stop offset="50%" style="stop-color:#27ae60"/>
      <stop offset="100%" style="stop-color:#1a7a40"/>
    </linearGradient>
    <linearGradient id="hexShine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1a7a40" flood-opacity="0.6"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="hexClip">
      <polygon points="100,8 182,52 182,148 100,192 18,148 18,52"/>
    </clipPath>
  </defs>

  <!-- Hex shadow -->
  <polygon points="100,12 184,56 184,152 100,196 16,152 16,56" fill="#1a7a40" opacity="0.4" transform="translate(2,4)"/>

  <!-- Hex background -->
  <polygon points="100,8 182,52 182,148 100,192 18,148 18,52" fill="url(#hexGrad)" filter="url(#shadow)"/>

  <!-- Copper border -->
  <polygon points="100,8 182,52 182,148 100,192 18,148 18,52" fill="none" stroke="#c8873a" stroke-width="4"/>

  <!-- Inner shine overlay -->
  <polygon points="100,8 182,52 182,148 100,192 18,148 18,52" fill="url(#hexShine)" clip-path="url(#hexClip)"/>

  <!-- Inner copper thin border -->
  <polygon points="100,18 172,58 172,142 100,182 28,142 28,58" fill="none" stroke="#c8873a" stroke-width="1.5" opacity="0.5"/>

  <!-- Sprout illustration -->
  <g transform="translate(100,105)" filter="url(#glow)">
    <!-- Pot -->
    <path d="M-22,30 L-18,48 L18,48 L22,30 Z" fill="#c1440e" opacity="0.95"/>
    <rect x="-24" y="26" width="48" height="8" rx="3" fill="#e05a20" opacity="0.95"/>
    <!-- Soil -->
    <ellipse cx="0" cy="30" rx="18" ry="5" fill="#5d3a1a" opacity="0.9"/>
    <!-- Stem -->
    <path d="M0,28 Q2,10 0,-10" stroke="#5cb85c" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Left leaf -->
    <path d="M0,5 Q-25,-8 -28,-28 Q-8,-20 0,5" fill="#4caf50"/>
    <path d="M0,5 Q-25,-8 -28,-28" stroke="#388e3c" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- Right leaf -->
    <path d="M0,-2 Q28,-15 30,-35 Q8,-25 0,-2" fill="#66bb6a"/>
    <path d="M0,-2 Q28,-15 30,-35" stroke="#388e3c" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- Sparkles -->
    <circle cx="-35" cy="-10" r="3" fill="#ffd700" opacity="0.9"/>
    <circle cx="35" cy="-18" r="2.5" fill="#ffd700" opacity="0.8"/>
    <circle cx="-28" cy="10" r="2" fill="#ffd700" opacity="0.7"/>
    <circle cx="30" cy="5" r="1.5" fill="#fff" opacity="0.8"/>
  </g>

  <!-- Badge name -->
  <text x="100" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#c8873a" letter-spacing="1">PRIMERA ACTIVIDAD</text>
</svg>
