<svg width="200" height="220" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8e44ad"/>
      <stop offset="50%" style="stop-color:#6c3483"/>
      <stop offset="100%" style="stop-color:#4a235a"/>
    </linearGradient>
    <linearGradient id="hexShine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="trophyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ffa500"/>
      <stop offset="100%" style="stop-color:#c8873a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4a235a" flood-opacity="0.7"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="hexClip">
      <polygon points="100,8 182,52 182,148 100,192 18,148 18,52"/>
    </clipPath>
  </defs>

  <polygon points="100,12 184,56 184,152 100,196 16,152 16,56" fill="#4a235a" opacity="0.5" transform="translate(2,4)"/>
  <polygon points="100,8 182,52 182,148 100,192 18,148 18,52" fill="url(#hexGrad)" filter="url(#shadow)"/>
  <polygon points="100,8 182,52 182,148 100,192 18,148 18,52" fill="none" stroke="#c8873a" stroke-width="4"/>
  <polygon points="100,8 182,52 182,148 100,192 18,148 18,52" fill="url(#hexShine)" clip-path="url(#hexClip)"/>
  <polygon points="100,18 172,58 172,142 100,182 28,142 28,58" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.4"/>

  <!-- Trophy -->
  <g transform="translate(100,100)" filter="url(#glow)">
    <!-- Trophy shadow -->
    <path d="M-26,-35 Q-32,5 -20,22 Q-8,38 0,38 Q8,38 20,22 Q32,5 26,-35 Z" fill="#4a235a" opacity="0.5" transform="translate(3,5)"/>
    <!-- Cup body -->
    <path d="M-26,-35 Q-32,5 -20,22 Q-8,38 0,38 Q8,38 20,22 Q32,5 26,-35 Z" fill="url(#trophyGrad)"/>
    <!-- Cup shine -->
    <path d="M-18,-30 Q-24,5 -15,20" stroke="#ffe566" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
    <ellipse cx="-5" cy="-22" rx="5" ry="8" fill="#fff" opacity="0.15" transform="rotate(-15,-5,-22)"/>
    <!-- Handles -->
    <path d="M-26,-25 Q-50,-25 -48,-8 Q-46,6 -26,2" fill="none" stroke="url(#trophyGrad)" stroke-width="5" stroke-linecap="round"/>
    <path d="M26,-25 Q50,-25 48,-8 Q46,6 26,2" fill="none" stroke="url(#trophyGrad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Stem -->
    <rect x="-6" y="38" width="12" height="12" fill="#c8873a"/>
    <!-- Base -->
    <rect x="-22" y="50" width="44" height="8" rx="3" fill="#c8873a"/>
    <!-- Star on cup -->
    <polygon points="0,-18 4,-8 14,-8 6,-2 9,8 0,2 -9,8 -6,-2 -14,-8 -4,-8" fill="#fff8dc" opacity="0.95"/>
  </g>

  <!-- Sparkles -->
  <circle cx="50" cy="68" r="3.5" fill="#ffd700" opacity="0.9" filter="url(#glow)"/>
  <circle cx="152" cy="72" r="3" fill="#ffd700" opacity="0.8" filter="url(#glow)"/>
  <circle cx="55" cy="130" r="2.5" fill="#ffd700" opacity="0.7"/>
  <circle cx="148" cy="126" r="3" fill="#ffd700" opacity="0.8"/>

  <text x="100" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#c8873a" letter-spacing="1">MES PERFECTO</text>
</svg>
